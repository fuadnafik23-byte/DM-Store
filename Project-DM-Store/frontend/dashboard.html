<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Zero Store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="output.css">
</head>
<body>

  <h1><i class="fa-solid fa-gauge"></i> Dashboard Order Zero Store</h1>

  <div class="card">
    <h2><i class="fa-solid fa-plus"></i> Tambah Pesanan</h2>
    <form id="formTambah">
      <div class="input-field">
    <label>Nama Pembeli</label>
    <input type="text" id="nama" placeholder="Nama" required>
  </div>
      <div class="input-group">
        <div class="input-field">
          <label>ID Game</label>
          <input type="text" id="gameId" placeholder="Masukkan ID" required>
        </div>
        <div class="input-field">
          <label>Server</label>
          <input type="text" id="server" placeholder="Masukkan Server" required>
        </div>
      </div>

      <div class="input-group">
        <div class="input-field">
  <label>Pilih Game</label>
  <select id="game" required>
    <option value="" disabled selected>-- Pilih Game --</option>
    <option value="Mobile Legends">Mobile Legends</option>
    <option value="Free Fire">Free Fire</option>
    <option value="PUBG Mobile">PUBG Mobile</option>
  </select>
</div>
      </div>

      <div class="input-group">
        <div class="input-field">
          <label>Nominal</label>
          <input type="number" id="nominal" placeholder="Contoh: 50000" required>
        </div>
        <div class="input-field">
          <label>WhatsApp</label>
          <input type="text" id="whatsapp" placeholder="0812..." required>
        </div>
      </div>

      <label>Status Pesanan</label>
      <select id="status">
        <option value="Baru">Baru</option>
        <option value="Diproses">Diproses</option>
        <option value="Selesai">Selesai</option>
      </select>

      <button type="submit" class="btnTambah">
        <i class="fa-solid fa-floppy-disk"></i> Simpan Pesanan
      </button>
    </form>
  </div>

  <table>
    <thead>
      <tr>
        <th>Data Akun</th>
        <th>Nama</th>
        <th>Game</th>
        <th>Nominal</th>
        <th>Status</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

  <div id="modalEdit" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border:1px solid #ccc; z-index:1000;">
  <h3>Edit Pesanan</h3>
  <input type="text" id="editNama">
  <select id="editStatus">
    <option value="Baru">Baru</option>
    <option value="Diproses">Diproses</option>
    <option value="Selesai">Selesai</option>
  </select>
  <button onclick="simpanEdit()">Update</button>
  <button onclick="tutupEdit()">Batal</button>
</div>

  <script src="script.js"></script>
</body>
</html>
