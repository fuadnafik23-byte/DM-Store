<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Admin</title>
<style>
body{
font-family:Arial;
background:#111827;
color:white;
padding:30px;
}
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}
th,td{
padding:12px;
border:1px solid #333;
text-align:center;
}
th{
background:#2563eb;
}
button{
padding:8px 12px;
border:none;
cursor:pointer;
border-radius:6px;
}
.proses{background:orange;}
.selesai{background:green;color:white;}
.hapus{background:red;color:white;}
input{
padding:10px;
width:300px;
}
.card{
display:inline-block;
background:#1f2937;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}
</style>
</head>
<body>

<h1>Dashboard Order Zero Store</h1>

<div class="card">
<h2>Total Pesanan: <span id="total">0</span></h2>
</div>

<br>

<input type="text" id="search" placeholder="Cari nama/game...">

<table>
<thead>
<tr>
<th>ID</th>
<th>Nama</th>
<th>Game</th>
<th>Nominal</th>
<th>Whatsapp</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>
async function loadData(){
let res = await fetch("http://localhost:3000/api/pesanan");
let data = await res.json();

document.getElementById("total").innerText = data.length;

let html = "";
data.forEach(item=>{
html += `
<tr>
<td>${item.id}</td>
<td>${item.nama}</td>
<td>${item.game}</td>
<td>${item.nominal}</td>
<td>${item.whatsapp}</td>
<td>${item.status}</td>
<td>
<button class="proses" onclick="updateStatus(${item.id},'Diproses')">Proses</button>
<button class="selesai" onclick="updateStatus(${item.id},'Selesai')">Selesai</button>
<button class="hapus" onclick="hapus(${item.id})">Hapus</button>
</td>
</tr>
`;
});
document.getElementById("data").innerHTML = html;
}

async function updateStatus(id,status){
await fetch(`http://localhost:3000/api/status/${id}`,{
method:"PUT",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({status})
});
loadData();
}

async function hapus(id){
await fetch(`http://localhost:3000/api/hapus/${id}`,{
method:"DELETE"
});
loadData();
}

loadData();
</script>

</body>
</html>
